# .github/workflows/nse_screener.yml
# ─────────────────────────────────────────────────────────────────────────────
# NSE Daily Screener + GitHub Pages Dashboard Publisher
# Runs automatically at 4:15 PM IST (10:45 UTC) Mon–Fri
# Publishes live dashboard to: https://YOUR-USERNAME.github.io/nse-screener/
# ─────────────────────────────────────────────────────────────────────────────

name: NSE Daily Screener

on:
  schedule:
    - cron: "45 10 * * 1-5"   # 4:15 PM IST, Mon–Fri — FULLY AUTOMATIC
  workflow_dispatch:            # Manual trigger from GitHub UI if needed

# Allow GitHub Actions to push to gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Restore bhavcopy history cache ───────────────────────────────────
      - name: Restore bhavcopy history cache
        uses: actions/cache@v4
        with:
          path: ./nse_history
          key: nse-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nse-history-${{ runner.os }}-

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      # ── 5. Run screener → writes to docs/ ───────────────────────────────────
      - name: Run NSE DMA Screener
        run: python nse_daily_screener.py

      # ── 6. Copy dashboard HTML into docs/ ───────────────────────────────────
      #    (index.html lives in repo root; copy to docs/ for GitHub Pages)
      - name: Copy dashboard to docs/
        run: |
          mkdir -p docs
          cp index.html docs/index.html

      # ── 7. Commit & push updated docs/ back to repo ─────────────────────────
      - name: Commit updated dashboard data
        run: |
          git config user.name  "NSE Screener Bot"
          git config user.email "bot@nse-screener.local"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update screener data $(date +'%Y-%m-%d %H:%M IST')"
          git push

      # ── 8. Deploy docs/ to GitHub Pages ─────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true          # keeps archive/ Excel files between runs

      # ── 9. Save cache ────────────────────────────────────────────────────────
      - name: Save bhavcopy history cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ./nse_history
          key: nse-history-${{ runner.os }}-${{ github.run_id }}
