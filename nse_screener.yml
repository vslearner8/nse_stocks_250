# .github/workflows/nse_screener.yml
# Runs at 4:15 PM IST (10:45 UTC) Mon–Fri AUTOMATICALLY
# Publishes live dashboard to: https://vslearner8.github.io/nse_stocks_250/

name: NSE Daily Screener

on:
  schedule:
    - cron: "45 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore bhavcopy history cache
        uses: actions/cache@v4
        with:
          path: ./nse_history
          key: nse-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nse-history-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Run NSE DMA Screener
        run: python nse_daily_screener.py

      - name: Copy dashboard HTML to docs/
        run: |
          mkdir -p docs
          cp index.html docs/index.html

      - name: Commit and push updated docs/
        run: |
          git config user.name  "NSE Screener Bot"
          git config user.email "bot@nse-screener.local"
          git add docs/
          git status
          git diff --staged --quiet || git commit -m "data: update screener $(date +'%Y-%m-%d %H:%M IST')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true

      - name: Save bhavcopy history cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ./nse_history
          key: nse-history-${{ runner.os }}-${{ github.run_id }}
