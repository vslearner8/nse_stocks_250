name: NSE Daily Screener

on:
  schedule:
    - cron: "45 10 * * 1-5"   # 4:15 PM IST every weekday
  workflow_dispatch:            # Manual trigger anytime

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas openpyxl requests

      - name: Run screener
        run: python nse_daily_screener.py

      - name: Copy index.html to docs/
        run: |
          mkdir -p docs
          cp index.html docs/index.html

      - name: Verify output files exist
        run: |
          echo "=== docs/ contents ==="
          ls -lh docs/
          echo "=== JSON preview (first 500 chars) ==="
          head -c 500 docs/screener_data.json
          echo ""

      - name: Commit and push docs/
        run: |
          git config user.name  "NSE Screener Bot"
          git config user.email "bot@nse-screener.local"
          git add docs/
          git status
          git diff --staged --quiet || git commit -m "data: screener update $(date +'%Y-%m-%d %H:%M')"
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true
          commit_message: "deploy: screener $(date +'%Y-%m-%d')"

